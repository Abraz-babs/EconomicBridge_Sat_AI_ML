# EconomicBridge — CI on every PR + push to main.
#
# Jobs run in parallel where possible:
#   - backend-{api,ingestion,ml,notifications}: install + ruff + pytest
#   - frontend: install + lint + build
#   - security: bandit + semgrep on the Python tree
#
# We do NOT run `terraform plan` here — that's in terraform.yml because
# it needs AWS credentials. This file stays credential-free so it can
# run on PRs from forks too.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: economic-bridge-project

jobs:
  # ───────── Backend services (matrix over the 4 Python apps) ─────────
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, ingestion, ml, notifications]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: economic-bridge-project/apps/${{ matrix.service }}/requirements*.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/${{ matrix.service }}/requirements.txt
          if [ -f apps/${{ matrix.service }}/requirements-dev.txt ]; then
            pip install -r apps/${{ matrix.service }}/requirements-dev.txt
          fi
          pip install ruff pytest pytest-asyncio

      - name: Ruff (lint)
        run: ruff check apps/${{ matrix.service }}

      - name: Pytest
        env:
          # Tests should never call real external APIs — mocks only.
          # These env vars exist to satisfy pydantic-settings at import time.
          ENVIRONMENT: ci
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          TERMII_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
        run: |
          cd apps/${{ matrix.service }}
          pytest -x --tb=short -q

  # ───────── Frontend ─────────────────────────────────────────────────
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: economic-bridge-project/apps/frontend/package-lock.json

      - name: Install
        run: |
          cd apps/frontend
          npm ci

      - name: Lint
        run: |
          cd apps/frontend
          npm run lint

      - name: Build (production)
        env:
          # Build-time public env vars. CI builds with placeholders;
          # real values are injected per-environment by the deploy job.
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
          NEXT_PUBLIC_MAPBOX_TOKEN: "pk.placeholder"
        run: |
          cd apps/frontend
          npm run build

  # ───────── Security scan (bandit + semgrep) ─────────────────────────
  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit + semgrep
        run: pip install bandit semgrep

      - name: Bandit (HIGH severity only — fail on findings)
        run: |
          bandit -r apps/ -ll -ii \
            --skip B101 \
            --exit-zero-on-skipped \
            -f txt

      - name: Semgrep (OWASP rule pack)
        run: |
          semgrep --config=p/python --config=p/owasp-top-ten \
            --error \
            --severity ERROR \
            apps/

  # ───────── Aggregate result (branch protection key) ─────────────────
  # Branch protection requires a single check name. Point it at this job.
  ci-passed:
    name: ci passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All checks passed"
