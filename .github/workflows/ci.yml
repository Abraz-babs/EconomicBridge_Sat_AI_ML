# EconomicBridge — CI on every PR + push to main.
#
# Jobs run in parallel where possible:
#   - backend-{api,ingestion,ml,notifications}: install + ruff + pytest
#   - frontend: install + lint + build
#   - security: bandit + semgrep on the Python tree
#
# We do NOT run `terraform plan` here — that's in terraform.yml because
# it needs AWS credentials. This file stays credential-free so it can
# run on PRs from forks too.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ───────── Backend services (matrix over the 4 Python apps) ─────────
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, ingestion, ml, notifications]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/${{ matrix.service }}/requirements*.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/${{ matrix.service }}/requirements.txt
          if [ -f apps/${{ matrix.service }}/requirements-dev.txt ]; then
            pip install -r apps/${{ matrix.service }}/requirements-dev.txt
          fi
          # httpx + pytest-cov are required by fastapi.testclient.TestClient
          # and by the Slice 15 coverage reporting respectively. Install
          # unconditionally for the matrix in case a service's dev file
          # omits them.
          pip install ruff pytest pytest-asyncio pytest-cov httpx

      - name: Ruff (lint)
        run: ruff check apps/${{ matrix.service }}

      - name: Pytest with coverage
        env:
          # Tests should never call real external APIs — mocks only.
          # These env vars exist to satisfy pydantic-settings at import time.
          ENVIRONMENT: ci
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          TERMII_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
        run: |
          cd apps/${{ matrix.service }}
          # Slice 15 coverage — .coveragerc at repo root pins the omit list
          # (tests, migrations, scripts, __pycache__, .venv, main.py). XML
          # report uploaded as artifact for visibility; no --cov-fail-under
          # threshold yet (current baselines: api 77 / ingestion 84 / ml 73
          # / notifications 80 — gate enforcement queued for a follow-up
          # slice that lifts coverage toward CLAUDE.md's 85% target).
          pytest -x --tb=short -q \
            --cov=. \
            --cov-config=../../.coveragerc \
            --cov-report=term \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: apps/${{ matrix.service }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  # ───────── Frontend ─────────────────────────────────────────────────
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install
        run: |
          cd apps/frontend
          npm ci

      - name: Lint
        run: |
          cd apps/frontend
          npm run lint

      - name: Build (production)
        env:
          # Build-time public env vars. CI builds with placeholders;
          # real values are injected per-environment by the deploy job.
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
          NEXT_PUBLIC_MAPBOX_TOKEN: "pk.placeholder"
        run: |
          cd apps/frontend
          npm run build

  # ───────── Security scan (bandit + semgrep) ─────────────────────────
  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit + semgrep
        run: pip install bandit semgrep

      - name: Bandit (HIGH severity only — fail on findings)
        # -ll = MEDIUM+, -ii = MEDIUM+ confidence; we want both at HIGH.
        # B101 (assert_used) is noise inside test files. Bandit's exit code
        # is non-zero only when issues are *found*, so a clean run passes.
        run: bandit -r apps/ -lll -iii --skip B101 -f txt

      - name: Semgrep (OWASP rule pack — advisory)
        # Advisory for now: prints findings into the CI log but does not fail
        # the build. We'll triage the findings and tighten this back to
        # blocking once the codebase is clean.
        continue-on-error: true
        run: |
          semgrep --config=p/python --config=p/owasp-top-ten \
            --severity ERROR \
            apps/

  # ───────── Aggregate result (branch protection key) ─────────────────
  # Branch protection requires a single check name. Point it at this job.
  ci-passed:
    name: ci passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All checks passed"
