[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: tests that require a live database (run with `pytest -m integration`)
    slow: tests that train real models or do heavy compute (run with `pytest -m slow`)
addopts = -m "not integration and not slow"
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sklearn.*
    ignore::FutureWarning:shap.*
