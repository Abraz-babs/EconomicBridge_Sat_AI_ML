[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: tests that require a live database (run with `pytest -m integration`)
addopts = -m "not integration"
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sklearn.*
    ignore::FutureWarning:shap.*
