# tenants.yaml — EconomicBridge Tenant Configuration
# All 52 tenants: 36 Nigerian States + FCT + 15 ECOWAS Countries
# ================================================================
# Adding a new tenant = adding a block here + running:
#   python scripts/generate_tenant.py --tenant-id {id}
# No application code changes required.
# ================================================================

