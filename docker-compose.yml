  #   build:
  #     context: ./apps/ingestion
  #   container_name: eb-celery
  #   command: ["celery", "-A", "tasks", "worker", "--loglevel=info", "--concurrency=2"]
  #   env_file: [.env]
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
  #     CELERY_BROKER_URL: redis://redis:6379/1
  #     CELERY_RESULT_BACKEND: redis://redis:6379/2
  #   depends_on: [db, redis]
