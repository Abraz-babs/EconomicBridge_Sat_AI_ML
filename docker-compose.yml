# EconomicBridge — full-stack local development via Docker Compose.
#
# Usage:
#   1. Copy `.env.docker.example` to `.env.docker` and fill in real values,
#      or rely on the existing `.env` at the repo root.
#   2. docker compose up --build
#      (first run takes 8–12 min for image builds; subsequent ~30s warm.)
#   3. Open http://localhost:3000 — the dashboard auto-fetches from API:8000.
#
# Services & ports:
#   db             postgis/postgis:16-3.5    5435->5432  (host 5435 avoids native PG clash)
#   redis          redis:7-alpine                  6379
#   migrate        alembic upgrade head            —     (one-shot; depends on db)
#   api            FastAPI                         8000
#   ingestion      FastAPI                         8001
#   ml             FastAPI + Random Forest         8002
#   notifications  FastAPI + Termii/Twilio         8003
#   frontend       Next.js standalone              3000
#
# Future scaffolding (Celery, Flower, Prometheus, Grafana) is left commented
# at the bottom — bring it up once Step 10.1 (Redis + Celery task queue) lands.

name: economicbridge

services:
  # ─── Postgres 16 + PostGIS 3.5 ───────────────────────────────────────
  db:
    image: postgis/postgis:16-3.5-alpine
    container_name: eb-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: economicbridge
    ports:
      - "5435:5432"
    volumes:
      - eb-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d economicbridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [economicbridge]

  # ─── Redis 7 (caching + future Celery broker) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - eb-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [economicbridge]

  # ─── Alembic migrations (one-shot) ──────────────────────────────────
  # Runs `alembic upgrade head` then exits. Dependent services wait via
  # `service_completed_successfully` so they only start once schema is current.
  migrate:
    build:
      context: ./apps/api
      target: runtime
    container_name: eb-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    networks: [economicbridge]

  # ─── FastAPI backend (port 8000) ────────────────────────────────────
  api:
    build:
      context: ./apps/api
    container_name: eb-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    networks: [economicbridge]

  # ─── Satellite ingestion (port 8001) ────────────────────────────────
  ingestion:
    build:
      context: ./apps/ingestion
    container_name: eb-ingestion
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    networks: [economicbridge]

  # ─── ML conflict predictor (port 8002) ──────────────────────────────
  ml:
    build:
      context: ./apps/ml
    container_name: eb-ml
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - eb-ml-artifacts:/app/models/artifacts
    ports:
      - "8002:8002"
    networks: [economicbridge]

  # ─── SMS notifications (port 8003) ──────────────────────────────────
  notifications:
    build:
      context: ./apps/notifications
    container_name: eb-notifications
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-devpassword}@db:5432/economicbridge
    ports:
      - "8003:8003"
    networks: [economicbridge]

  # ─── Next.js dashboard (port 3000) ──────────────────────────────────
  # NEXT_PUBLIC_* are *build-time* args because Next inlines them into the
  # client bundle. The browser (not the container) reaches localhost:8000
  # so NEXT_PUBLIC_API_BASE_URL stays on localhost even inside compose.
  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: eb-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks: [economicbridge]

  # ────────────────────────────────────────────────────────────────────
  # FUTURE SCAFFOLDING — uncomment when Step 10.1 (Celery + scheduled
  # tasks) and Step 12.x (monitoring) land. Kept here so the original
  # docker-compose.yml intent is preserved.
  # ────────────────────────────────────────────────────────────────────
